<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hanzi Flashcards</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f2f2f2">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="漢字">
  <link rel="apple-touch-icon" href="icon-192.png">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f2f2f2;
      color: #1a1a1a;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    header {
      width: 100%;
      background: #ffffff;
      padding: 16px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #ddd;
    }

    header h1 {
      font-size: 1.4rem;
      font-weight: 700;
      color: #e94560;
      letter-spacing: 1px;
    }

    .header-info {
      font-size: 0.85rem;
      color: #595959;
    }

    .controls {
      width: 100%;
      max-width: 700px;
      display: flex;
      gap: 12px;
      padding: 20px 16px 0;
      flex-wrap: wrap;
      align-items: center;
    }

    .controls label {
      font-size: 0.85rem;
      color: #555;
    }

    select, button {
      padding: 8px 16px;
      border-radius: 8px;
      border: 1px solid #ccc;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 0.9rem;
      cursor: pointer;
    }

    select:focus, button:focus { outline: 2px solid #b5173a; }

    .btn-primary {
      background: #2e7d46;
      border-color: #2e7d46;
      color: #fff;
      font-weight: 600;
    }

    .btn-primary:hover { background: #1f5c32; }

    .btn-secondary:hover { background: #e8e8e8; }

    .progress-bar-wrap {
      width: 100%;
      max-width: 700px;
      padding: 16px 16px 0;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.8rem;
      color: #595959;
      margin-bottom: 6px;
    }

    .progress-bar {
      width: 100%;
      height: 6px;
      background: #ddd;
      border-radius: 3px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: #e94560;
      border-radius: 3px;
      transition: width 0.3s ease;
    }

    .card-area {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px 16px;
      width: 100%;
    }

    #cardContainer {
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .scene {
      width: 100%;
      max-width: 480px;
      height: 320px;
      perspective: 1000px;
      cursor: pointer;
    }

    .card {
      width: 100%;
      height: 100%;
      position: relative;
      transform-style: preserve-3d;
      transition: transform 0.55s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .card.flipped { transform: rotateY(180deg); }

    .card-face {
      position: absolute;
      inset: 0;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      border-radius: 20px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .card-front {
      background: #1a1a1a;
      border: 1px solid #333;
    }

    .card-back {
      background: #ffffff;
      border: 1px solid #ddd;
      transform: rotateY(180deg);
    }

    .hanzi-char {
      font-size: 9rem;
      line-height: 1;
      color: #ffffff;
      user-select: none;
    }

    .card-hint {
      margin-top: 16px;
      font-size: 0.75rem;
      color: #a8b8d0;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .card-id {
      position: absolute;
      top: 16px;
      left: 20px;
      font-size: 0.7rem;
      color: #a8b8d0;
    }

    .card-back .meaning {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a1a;
      text-align: center;
      margin-bottom: 20px;
    }

    .card-back .pinyin {
      font-size: 1.2rem;
      color: #b5173a;
      margin-bottom: 8px;
      letter-spacing: 1px;
    }

    .card-back .jyutping {
      font-size: 1.1rem;
      color: #6b3fa0;
      margin-bottom: 8px;
    }

    .card-back .label {
      font-size: 0.65rem;
      color: #595959;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 2px;
    }

    .back-row {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .speak-btn {
      background: none;
      border: 1px solid #595959;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      font-size: 0.85rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #595959;
      padding: 0;
      transition: border-color 0.2s, color 0.2s;
      flex-shrink: 0;
    }

    .speak-btn:hover { border-color: #b5173a; color: #b5173a; }

    .pronunciation-row {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: #ddd;
      margin: 12px 0;
    }

    .rating-row {
      display: flex;
      gap: 10px;
      margin-top: 20px;
    }

    .rating-btn {
      padding: 8px 20px;
      border-radius: 20px;
      border: none;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.1s;
    }

    .rating-btn:hover { opacity: 0.85; transform: scale(1.05); }
    .rating-btn:active { transform: scale(0.95); }

    .btn-again { background: #b5173a; color: #fff; }
    .btn-reps  { background: #1a6b8a; color: #fff; }
    .btn-good  { background: #2e7d46; color: #fff; }

    .stats-row {
      display: flex;
      gap: 24px;
      margin-top: 8px;
    }

    .stat { text-align: center; }
    .stat-num { font-size: 1.3rem; font-weight: 700; color: #1a1a1a; }
    .stat-num.known    { color: #2e7d46; }
    .stat-num.learning { color: #b5173a; }
    .stat-num.new-cards { color: #1a1a1a; }
    .stat-label { font-size: 0.7rem; color: #595959; text-transform: uppercase; }

    .search-wrap {
      width: 100%;
      max-width: 700px;
      padding: 16px 16px 0;
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 10px 16px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #ffffff;
      color: #1a1a1a;
      font-size: 0.95rem;
    }

    .search-input:focus { outline: 2px solid #e94560; }
    .search-input::placeholder { color: #767676; }

    #no-card {
      text-align: center;
      color: #595959;
      font-size: 1.1rem;
      padding: 60px;
    }

  </style>
</head>
<body>
  <header>
    <h1>漢字 Flashcards</h1>
    <span class="header-info">Traditional Hanzi · Top 3123</span>
  </header>

  <div class="controls">
    <label>Mode:</label>
    <select id="modeSelect">
      <option value="due">Due for Review (SRS)</option>
      <option value="sequential">Sequential</option>
      <option value="random">Random</option>
    </select>
    <label>Range:</label>
    <select id="rangeSelect">
      <option value="3123">All 3123</option>
      <option value="100">First 100</option>
      <option value="250">First 250</option>
      <option value="500">First 500</option>
      <option value="750">First 750</option>
      <option value="1000">First 1000</option>
      <option value="1500">First 1500</option>
      <option value="2000">First 2000</option>
      <option value="2500">First 2500</option>
    </select>
    <button class="btn-primary" onclick="startSession()">Start</button>
    <button class="btn-secondary" onclick="resetProgress()">Reset Progress</button>
  </div>

  <div class="search-wrap">
    <input class="search-input" id="searchInput" type="text" placeholder="Search hanzi, pinyin, or meaning…" oninput="handleSearch()" />
  </div>

  <div class="progress-bar-wrap">
    <div class="progress-meta">
      <span id="progressText">Card 0 / 0</span>
      <div class="stats-row">
        <div class="stat"><div class="stat-num known" id="statKnown">0</div><div class="stat-label">Known</div></div>
        <div class="stat"><div class="stat-num learning" id="statLearning">0</div><div class="stat-label">Learning</div></div>
        <div class="stat"><div class="stat-num new-cards" id="statNew">0</div><div class="stat-label">New</div></div>
      </div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
  </div>

  <div class="card-area">
    <div id="cardContainer">
      <div id="no-card">Press <strong>Start</strong> to begin your session.</div>
    </div>
  </div>

  <script src="characters.js"></script>
  <script>
    // ── SRS state ──────────────────────────────────────────────────────────────
    const STORAGE_KEY = 'hanzi_srs_v1';

    function loadSRS() {
      try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
    }

    function saveSRS(data) {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    }

    // Simple SM-2-inspired intervals (days)
    const INTERVALS = { again: 0, hard: 1, good: 3, easy: 7 };

    function getCardState(id) {
      const srs = loadSRS();
      return srs[id] || { interval: 0, due: 0, ease: 2.5, reps: 0, state: 'new' };
    }

    function updateCardState(id, rating) {
      const srs = loadSRS();
      const card = getCardState(id);
      const now = Date.now();
      const dayMs = 86400000;

      if (rating === 'again') {
        card.interval = 0;
        card.state = 'learning';
        card.due = now + 60000; // 1 min
      } else if (rating === 'hard') {
        card.interval = Math.max(1, card.interval * 1.2);
        card.ease = Math.max(1.3, card.ease - 0.15);
        card.state = 'learning';
        card.due = now + card.interval * dayMs;
      } else if (rating === 'good') {
        card.interval = card.interval < 1 ? 1 : Math.round(card.interval * card.ease);
        card.state = card.interval >= 7 ? 'known' : 'learning';
        card.due = now + card.interval * dayMs;
      } else if (rating === 'easy') {
        card.ease = Math.min(3.0, card.ease + 0.15);
        card.interval = card.interval < 1 ? 4 : Math.round(card.interval * card.ease * 1.3);
        card.state = 'known';
        card.due = now + card.interval * dayMs;
      }

      card.reps += 1;
      srs[id] = card;
      saveSRS(srs);
      updateStats();
    }

    // ── Session state ──────────────────────────────────────────────────────────
    let deck = [];
    let cursor = 0;
    let isFlipped = false;
    let searchActive = false;

    function buildDeck() {
      const mode = document.getElementById('modeSelect').value;
      const range = parseInt(document.getElementById('rangeSelect').value);
      let pool = characters.slice(0, range);

      if (mode === 'random') {
        pool = [...pool].sort(() => Math.random() - 0.5);
      } else if (mode === 'due') {
        const now = Date.now();
        pool = pool.filter(c => {
          const s = getCardState(c.id);
          return s.state === 'new' || s.due <= now;
        });
        if (pool.length === 0) {
          alert('No cards due for review! Come back later or switch to Sequential mode.');
          return false;
        }
      }

      return pool;
    }

    function startSession() {
      searchActive = false;
      document.getElementById('searchInput').value = '';
      const d = buildDeck();
      if (!d) return;
      deck = d;
      cursor = 0;
      renderCard();
    }

    function renderCard() {
      if (deck.length === 0) {
        document.getElementById('cardContainer').innerHTML = '<div id="no-card">No cards to show.</div>';
        updateProgress(0, 0);
        return;
      }

      isFlipped = false;
      const ch = deck[cursor];
      const srs = getCardState(ch.id);

      document.getElementById('cardContainer').innerHTML = `
        <div class="scene" onclick="flipCard()">
          <div class="card" id="mainCard">
            <div class="card-face card-front">
              <span class="card-id">#${ch.id}</span>
              <div class="hanzi-char">${ch.hanzi}</div>
              <div class="card-hint">tap to reveal</div>
            </div>
            <div class="card-face card-back">
              <span class="card-id">#${ch.id}</span>
              <div class="meaning">${ch.meaning}</div>
              <div class="back-row">
                <div class="label">Mandarin Pinyin</div>
                <div class="pronunciation-row">
                  <div class="pinyin">${ch.pinyin}</div>
                  <button class="speak-btn" onclick="event.stopPropagation(); speak('${ch.hanzi}', 'zh-CN')" title="Listen (Mandarin)">🔊</button>
                </div>
              </div>
              <div class="divider"></div>
              <div class="back-row">
                <div class="label">Cantonese Jyutping</div>
                <div class="pronunciation-row">
                  <div class="jyutping">${ch.jyutping}</div>
                  <button class="speak-btn" onclick="event.stopPropagation(); speak('${ch.hanzi}', 'zh-HK')" title="Listen (Cantonese)">🔊</button>
                </div>
              </div>
            </div>
          </div>
        </div>
        <div style="display:flex;gap:16px;margin-top:20px;align-items:center;flex-direction:column;">
          <div class="rating-row" id="ratingRow" style="display:none">
            <button class="rating-btn btn-again" onclick="rate('again')">Don't Know</button>
            <button class="rating-btn btn-reps"  onclick="rate('good')">Reps</button>
            <button class="rating-btn btn-good"  onclick="rate('easy')">Known</button>
          </div>
        </div>
      `;

      updateProgress(cursor + 1, deck.length);
      updateStats();
    }

    function flipCard() {
      const card = document.getElementById('mainCard');
      if (!card) return;
      isFlipped = !isFlipped;
      card.classList.toggle('flipped', isFlipped);
      document.getElementById('ratingRow').style.display = isFlipped ? 'flex' : 'none';
    }

    function nextCard() {
      if (deck.length === 0) return;
      cursor = (cursor + 1) % deck.length;
      renderCard();
    }

    function prevCard() {
      if (deck.length === 0) return;
      cursor = (cursor - 1 + deck.length) % deck.length;
      renderCard();
    }

    function rate(rating) {
      if (deck.length === 0) return;
      updateCardState(deck[cursor].id, rating);
      nextCard();
    }

    function updateProgress(current, total) {
      document.getElementById('progressText').textContent = `Card ${current} / ${total}`;
      const pct = total ? (current / total) * 100 : 0;
      document.getElementById('progressFill').style.width = pct + '%';
    }

    function updateStats() {
      const srs = loadSRS();
      let known = 0, learning = 0, newCards = 0;
      characters.forEach(c => {
        const s = srs[c.id];
        if (!s || s.state === 'new') newCards++;
        else if (s.state === 'known') known++;
        else learning++;
      });
      document.getElementById('statKnown').textContent = known;
      document.getElementById('statLearning').textContent = learning;
      document.getElementById('statNew').textContent = newCards;
    }

    function resetProgress() {
      if (!confirm('Reset all SRS progress? This cannot be undone.')) return;
      localStorage.removeItem(STORAGE_KEY);
      updateStats();
    }

    // ── Search ─────────────────────────────────────────────────────────────────
    function handleSearch() {
      const q = document.getElementById('searchInput').value.trim().toLowerCase();
      if (!q) {
        if (searchActive) {
          searchActive = false;
          startSession();
        }
        return;
      }

      searchActive = true;
      deck = characters.filter(c =>
        c.hanzi.includes(q) ||
        c.pinyin.toLowerCase().includes(q) ||
        c.jyutping.toLowerCase().includes(q) ||
        c.meaning.toLowerCase().includes(q)
      );
      cursor = 0;
      renderCard();
    }

    // ── Keyboard shortcuts ─────────────────────────────────────────────────────
    document.addEventListener('keydown', e => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
      switch (e.key) {
        case ' ': e.preventDefault(); flipCard(); break;
        case 'ArrowRight': nextCard(); break;
        case 'ArrowLeft': prevCard(); break;
        case '1': if (isFlipped) rate('again'); break;
        case '2': if (isFlipped) rate('hard'); break;
        case '3': if (isFlipped) rate('good'); break;
        case '4': if (isFlipped) rate('easy'); break;
      }
    });

    // ── Speech ────────────────────────────────────────────────────────────────
    function speak(text, lang) {
      if (!('speechSynthesis' in window)) return;
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(text);
      u.lang = lang;
      u.rate = 0.8;
      window.speechSynthesis.speak(u);
    }

    // ── Init ───────────────────────────────────────────────────────────────────
    updateStats();

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js');
    }
  </script>
</body>
</html>
